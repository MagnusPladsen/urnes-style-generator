<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urnes Style Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --border: #3a3a3a;
      --text: #f0f0f0;
      --text-muted: #888;
      --accent: #c8a45a;
      --accent-hover: #d4b870;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    header p {
      color: var(--text-muted);
      font-size: 13px;
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .controls {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .field-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="number"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 6px 8px;
      font-size: 13px;
      width: 100%;
    }

    input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="color"] {
      width: 40px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
      cursor: pointer;
      padding: 2px;
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-value {
      min-width: 24px;
      text-align: right;
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    button {
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #1a1a1a;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-small {
      padding: 5px 10px;
      font-size: 12px;
    }

    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
      overflow: hidden;
    }

    #svg-container {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #svg-container svg {
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    .export-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #status {
      font-size: 12px;
      color: var(--text-muted);
      min-height: 18px;
    }

    footer {
      padding: 10px 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    .color-field {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-field label {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
    }
  </style>
</head>
<body>

<header>
  <h1>Urnes Style Generator</h1>
  <p>Viking interlace pattern generator</p>
</header>

<main>
  <aside class="controls">
    <div class="control-group">
      <h3>Seed</h3>
      <div class="field-row">
        <input type="number" id="seed" value="42" min="0" max="4294967295" />
        <button class="btn-secondary btn-small" id="randomize">Random</button>
      </div>
    </div>

    <div class="control-group">
      <h3>Canvas</h3>
      <div class="field">
        <label>Width</label>
        <input type="number" id="width" value="400" min="100" max="2000" step="10" />
      </div>
      <div class="field">
        <label>Height</label>
        <input type="number" id="height" value="600" min="100" max="2000" step="10" />
      </div>
      <div class="field">
        <label>Composition</label>
        <select id="composition">
          <option value="panel">Panel</option>
          <option value="border">Border</option>
        </select>
      </div>
    </div>

    <div class="control-group">
      <h3>Complexity</h3>
      <div class="slider-row">
        <input type="range" id="complexity" min="1" max="10" value="5" />
        <span class="slider-value" id="complexity-val">5</span>
      </div>
    </div>

    <div class="control-group">
      <h3>Style</h3>
      <div class="toggle-row">
        <input type="checkbox" id="fill" checked />
        <label for="fill">Fill shapes</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="tapering" checked />
        <label for="tapering">Tapering</label>
      </div>
      <div class="field">
        <label>Stroke Width</label>
        <div class="slider-row">
          <input type="range" id="strokeWidth" min="1" max="8" value="2" step="0.5" />
          <span class="slider-value" id="strokeWidth-val">2</span>
        </div>
      </div>
      <div class="field">
        <label>Gap Size</label>
        <div class="slider-row">
          <input type="range" id="gapSize" min="2" max="20" value="6" step="1" />
          <span class="slider-value" id="gapSize-val">6</span>
        </div>
      </div>
    </div>

    <div class="control-group">
      <h3>Colors</h3>
      <div class="color-field">
        <label for="strokeColor">Stroke</label>
        <input type="color" id="strokeColor" value="#c8a45a" />
      </div>
      <div class="color-field">
        <label for="fillColor">Fill</label>
        <input type="color" id="fillColor" value="#c8a45a" />
      </div>
    </div>

    <button class="btn-primary" id="generate-btn">Generate</button>
    <div id="status"></div>
  </aside>

  <section class="preview">
    <div id="svg-container">
      <p style="color: var(--text-muted)">Click Generate to create a pattern</p>
    </div>
    <div class="export-bar">
      <button class="btn-secondary" id="download-svg">Download SVG</button>
      <button class="btn-secondary" id="copy-css">Copy CSS</button>
      <button class="btn-secondary" id="copy-svg">Copy SVG</button>
    </div>
  </section>
</main>

<footer>
  Urnes Style Generator — inspired by the Urnes stave church carvings, c. 1130 CE
</footer>

<script type="module" src="./app.ts"></script>
</body>
</html>
